<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Download — Espresso Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="site.css" />
    <link rel="icon" href="images/favicon.png" type="image/png" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="brand" href="index.html" aria-label="Espresso Terminal">
          <img
            class="brand__mark"
            src="images/espresso-mark.png"
            width="32"
            height="32"
            alt=""
            decoding="async"
          />
          <span class="wordmark-text">
            <span class="wordmark-text__espresso">Espresso</span>
            <span class="wordmark-text__terminal">Terminal</span>
          </span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="index.html">Home</a>
        </nav>
      </div>
    </header>

    <main id="main" class="download-main">
      <div class="download-card">
        <h1 class="download-title">Get the app</h1>
        <p class="download-status">
          Complete checkout on Stripe first. After payment, Stripe should send you to
          the page that starts the download. If you’re stuck, use purchase again or open
          <a class="bento__inline-link" href="after-payment.html">after-payment</a>
          after paying.
        </p>
        <a
          class="btn btn--primary download-btn"
          href="https://buy.stripe.com/14AaEW2Avegbc1N8nC6wE01"
          rel="noopener noreferrer"
          >Pay on Stripe</a
        >
        <p class="download-foot">
          <a class="bento__inline-link" href="index.html">← Back to home</a>
        </p>
      </div>
    </main>
  </body>
</html>
